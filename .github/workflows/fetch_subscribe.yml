# .github/workflows/fetch_subscribe.yml
name: 获取并更新VPN订阅节点

on:
  schedule:
    # 每2小时 运行（可根据需要调整）
    - cron: '0 */2 * * *'
  workflow_dispatch:   # 支持手动触发

jobs:
  update-subscribe:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 允许提交更改到仓库

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install requests

      - name: 运行订阅获取脚本
        run: python fetch_subscribe_nodes.py

      - name: 提交并推送更新（如有变更）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add subscribe_nodes.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "自动更新订阅节点 $(date -u '+%Y-%m-%d %H:%M:%S')"
          git push
        continue-on-error: true

      - name: 上传节点文件作为工作流产物
        uses: actions/upload-artifact@v4
        with:
          name: subscribe-nodes
          path: subscribe_nodes.txt