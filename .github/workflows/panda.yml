name: panda更新VPN订阅节点

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-subscribe:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install requests

      - name: 从 Gist 下载脚本（使用 Secret PANDA）
        run: |
          curl -o panda.py "${{ secrets.PANDA }}"
          if [ ! -f panda.py ]; then
            echo "错误：无法下载 panda.py，请检查 secret PANDA 的 URL"
            exit 1
          fi
          chmod +x panda.py
          echo "panda.py 下载成功，内容前10行："
          head -n 10 panda.py

      - name: 运行脚本生成 panda.txt
        run: |
          python panda.py
          echo "=== 当前目录文件列表 ==="
          ls -la
          if [ -f panda.txt ]; then
            echo "panda.txt 生成成功，内容行数："
            wc -l panda.txt
            head -n 3 panda.txt
          else
            echo "错误：panda.txt 未生成！"
            exit 1
          fi

      - name: 提交并推送更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add panda.txt
          if git diff --cached --quiet; then
            echo "没有变化，无需提交"
          else
            git commit -m "自动更新订阅节点 $(date -u '+%Y-%m-%d %H:%M:%S')"
            git push
          fi
        continue-on-error: true

      - name: 上传节点文件
        uses: actions/upload-artifact@v4
        with:
          name: panda-nodes
          path: panda.txt